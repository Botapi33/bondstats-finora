<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#06110d" />
  <meta name="description" content="BondStats Finora — AI-powered financial intelligence workspace." />
  <title>BondStats Finora</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div id="boot" class="boot-screen" aria-hidden="true">
    <div class="boot-orb"></div>
    <div class="boot-title">BondStats Finora</div>
    <div class="boot-text">Initializing Financial Operating System</div>
  </div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <div class="brand-name">BondStats <span>Finora</span></div>
          <div class="brand-subtitle">Financial Intelligence OS</div>
        </div>
      </div>

      <nav class="nav" aria-label="Main">
        <button class="nav-item active" data-route="dashboard">
          <span>Dashboard</span>
          <kbd>⌘1</kbd>
        </button>
        <button class="nav-item" data-route="chat">
          <span>AI Chat</span>
          <kbd>⌘2</kbd>
        </button>
        <button class="nav-item" data-route="portfolio">
          <span>Portfolio</span>
          <kbd>⌘3</kbd>
        </button>
        <button class="nav-item" data-route="brief">
          <span>Daily Brief</span>
          <kbd>⌘4</kbd>
        </button>
        <button class="nav-item" data-route="learn">
          <span>Learn</span>
          <kbd>⌘5</kbd>
        </button>
        <button class="nav-item" data-route="research">
          <span>Research</span>
          <kbd>⌘6</kbd>
        </button>
        <button class="nav-item" data-route="future">
          <span>Future Lab</span>
          <kbd>⌘7</kbd>
        </button>
      </nav>

      <div class="sidebar-card">
        <div class="sidebar-card-label">Mode</div>
        <select id="globalMode" class="select">
          <option value="professional">Professional</option>
          <option value="student">Student</option>
          <option value="investor">Investor</option>
          <option value="research">Research</option>
          <option value="eli5">Explain Like I’m 5</option>
        </select>
      </div>

      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span>Offline Mode Enabled</span>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <button class="icon-button mobile-only" id="menuToggle" aria-label="Open navigation">☰</button>

        <div class="search-wrap">
          <input id="globalSearch" class="global-search" placeholder="Search chats, notes, concepts, portfolios..." />
        </div>

        <div class="topbar-actions">
          <button class="pill-button" id="newChatBtn">New Chat</button>
          <button class="icon-button" id="themePulse" aria-label="Interface pulse">◈</button>
        </div>
      </header>

      <section id="view-dashboard" class="view active"></section>
      <section id="view-chat" class="view"></section>
      <section id="view-portfolio" class="view"></section>
      <section id="view-brief" class="view"></section>
      <section id="view-learn" class="view"></section>
      <section id="view-research" class="view"></section>
      <section id="view-future" class="view"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
